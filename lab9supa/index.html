<!DOCTYPE html>
<html lang="en">
<head>
    <title>RABS Job Board</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #00ff00; padding: 20px; }
        .job-card { border: 1px solid #00ff00; margin-bottom: 15px; padding: 15px; border-radius: 5px; }
        button { background: #00ff00; color: black; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        h1 { border-bottom: 2px solid #00ff00; display: inline-block; }
    </style>
</head>
<body>
    <h1>[ SYSTEM_JOB_LISTINGS ]</h1>
    <div id="job-container">Loading data from Supabase...</div>

    <script>
        const SB_URL = 'https://shljdrtdukhhtviyilre.supabase.co/rest/v1/jobs';
        const SB_KEY = 'sb_publishable_vH_HCJj30PvAMTD2RsLoJQ_6fmIygE_';

        fetch(SB_URL, {
            headers: {
                'apikey': SB_KEY,
                'Authorization': `Bearer ${SB_KEY}`
            }
        })
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('job-container');
            container.innerHTML = ''; // Clear loading text
            
            data.forEach(job => {
                container.innerHTML += `
                    <div class="job-card">
                        <h3>${job.position}</h3>
                        <p>Salary: ₱${job.salary}</p>
                        <p>Deadline: ${job.ends_at}</p>
                        <a href="details.html?id=${job.id}"><button>VIEW_DETAILS</button></a>
                    </div>
                `;
            });
        })
        .catch(err => console.error("Error:", err));
    </script>
</body>
</html>
